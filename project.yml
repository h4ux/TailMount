name: TailMount
options:
  bundleIdPrefix: com.tailmount
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

packages:
  Citadel:
    url: https://github.com/orlandos-nl/Citadel.git
    from: "0.9.0"
  swift-nio:
    url: https://github.com/apple/swift-nio.git
    from: "2.65.0"

targets:
  TailMount:
    type: application
    platform: macOS
    sources:
      - TailMount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tailmount.app
        PRODUCT_NAME: TailMount
        INFOPLIST_FILE: TailMount/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: TailMount/Resources/TailMount.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - package: Citadel
      - package: swift-nio
        product: NIOCore
      - package: swift-nio
        product: NIOPosix
      - package: swift-nio
        product: NIOHTTP1
