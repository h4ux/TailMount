name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild -project TailMount.xcodeproj \
            -scheme TailMount \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            build

      - name: Create DMG
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/TailMount.app"
          DMG_DIR="build/dmg"
          mkdir -p "$DMG_DIR"
          cp -R "$APP_PATH" "$DMG_DIR/TailMount.app"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create \
            -volname "TailMount" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "build/TailMount.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TailMount.dmg
          path: build/TailMount.dmg

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/TailMount.dmg
          generate_release_notes: true
